# Phase 0 control-plane config: static NKey-only access + isolated SYS account.
#
# - fleet users are identity-bound to one sender lane: fleet.<handle>.>
# - control grants are minimal, enumerated JS/KV/inbox controls.
# - $SYS is isolated to server-operations scope only.

port: 4222

jetstream {
  store_dir: "/var/lib/hangar-bridge/jetstream"
  sync_interval: "always"
}

accounts {
  HANGAR {
    jetstream: enabled
    users: [
      {
        nkey: UD2DPVEYCXOD7XBOZ6SPX6VG34VKFO6J7LMPAFEHEA75HBLFLTGHLORB
        permissions: {
          publish: {
            allow: [
              "fleet.gentoo.>",
              "$JS.ACK.HANGAR_TASKS.gentoo.>",
              "$JS.API.CONSUMER.MSG.NEXT.HANGAR_TASKS.gentoo",
              "$JS.API.CONSUMER.INFO.HANGAR_TASKS.gentoo",
              "$KV.HANGAR_DEDUP.gentoo.>",
              "$JS.API.DIRECT.GET.KV_HANGAR_DEDUP.>",
              "$JS.API.STREAM.INFO.KV_HANGAR_DEDUP",
              "$JS.API.CONSUMER.CREATE.KV_HANGAR_DEDUP",
              "$JS.API.CONSUMER.INFO.KV_HANGAR_DEDUP.>",
              "$JS.API.CONSUMER.MSG.NEXT.KV_HANGAR_DEDUP.>",
              "_INBOX.gentoo.>"
            ]
          }
          subscribe: {
            allow: [
              "fleet.*.to.gentoo.>",
              "fleet.*.to.team.>",
              "_INBOX.gentoo.>"
            ]
          }
        }
      },
      {
        nkey: UAYU7ZMDS43RM5FC23YSNIAHLEJ4YRFZ2VX2NTRP652SXD6IHKDZZ7WU
        permissions: {
          publish: {
            allow: [
              "fleet.openclaw.>",
              "$JS.ACK.HANGAR_TASKS.openclaw.>",
              "$JS.API.CONSUMER.MSG.NEXT.HANGAR_TASKS.openclaw",
              "$JS.API.CONSUMER.INFO.HANGAR_TASKS.openclaw",
              "$KV.HANGAR_DEDUP.openclaw.>",
              "$JS.API.DIRECT.GET.KV_HANGAR_DEDUP.>",
              "$JS.API.STREAM.INFO.KV_HANGAR_DEDUP",
              "$JS.API.CONSUMER.CREATE.KV_HANGAR_DEDUP",
              "$JS.API.CONSUMER.INFO.KV_HANGAR_DEDUP.>",
              "$JS.API.CONSUMER.MSG.NEXT.KV_HANGAR_DEDUP.>",
              "_INBOX.openclaw.>"
            ]
          }
          subscribe: {
            allow: [
              "fleet.*.to.openclaw.>",
              "fleet.*.to.team.>",
              "_INBOX.openclaw.>"
            ]
          }
        }
      },
      {
        nkey: UDW2F45CHU2UXYQNHYLVQGNFVFLUFJYMAFGYIZTLEG5XXGPRW2KFBVFK
        permissions: {
          publish: {
            allow: [
              "$JS.API.STREAM.CREATE.>",
              "$JS.API.STREAM.UPDATE.>",
              "$JS.API.STREAM.DELETE.>",
              "$JS.API.STREAM.PURGE.>",
              "$JS.API.STREAM.INFO.>",
              "$JS.API.STREAM.NAMES",
              "$JS.API.STREAM.LIST",
              "$JS.API.INFO",
              "$JS.API.CONSUMER.DURABLE.CREATE.>",
              "$JS.API.CONSUMER.CREATE.>",
              "$JS.API.CONSUMER.DELETE.>",
              "$JS.API.CONSUMER.INFO.>",
              "$JS.API.CONSUMER.LIST.>",
              "$JS.API.CONSUMER.NAMES.>",
              "$KV.>",
              "_INBOX.admin.>"
            ]
          }
          subscribe: {
            allow: [ "_INBOX.admin.>" ]
          }
        }
      }
    ]
  }

  SYS {
    users: [
      { nkey: UBXKH25WV6SYQHY4NCLNS4BXOK6RA3Q6JBGVP5CT5AJF7DBXJD73MJO5 }
    ]
  }
}

system_account: SYS
